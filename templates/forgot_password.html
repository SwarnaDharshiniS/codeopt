{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card card-dark p-4">
            <h3 class="mb-1" style="color:#F8E9E9;">🔑 Forgot Password</h3>
            <p style="color:#C9AFAF; font-size:0.9rem; margin-bottom:20px;">
                Enter your email and we'll send you a reset link.
            </p>

            <form method="POST">
                <div class="mb-3">
                    <label style="color:#F8E9E9;">Email</label>
                    <input name="email" type="email" class="form-control"
                           style="background:#2A1C1C; color:#F8E9E9; border-color:#5C3A2E;"
                           required autofocus>
                </div>

                <button class="btn btn-burgundy w-100">Send Reset Link</button>
            </form>

            <div class="mt-3" style="color:#C9AFAF; font-size:0.9rem;">
                Remembered it?
                <a href="/login" style="color:#8B2E2E;">Back to login</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
