{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card card-dark p-4">
            <h3 class="mb-1" style="color:#F8E9E9;">🔒 Reset Password</h3>
            <p style="color:#C9AFAF; font-size:0.9rem; margin-bottom:20px;">
                Choose a new password for your account.
            </p>

            {% if error %}
            <div class="mb-3 p-2"
                 style="background:#3B0000; color:#FF8A80; border:1px solid #8B2E2E;
                        border-radius:6px; font-size:0.9rem;">
                ⚠ {{ error }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <label style="color:#F8E9E9;">New Password</label>
                    <input name="new_password" type="password" id="newPw"
                           class="form-control"
                           style="background:#2A1C1C; color:#F8E9E9; border-color:#5C3A2E;"
                           required minlength="6" autofocus>
                </div>

                <div class="mb-3">
                    <label style="color:#F8E9E9;">Confirm New Password</label>
                    <input name="confirm_password" type="password" id="confirmPw"
                           class="form-control"
                           style="background:#2A1C1C; color:#F8E9E9; border-color:#5C3A2E;"
                           required minlength="6">
                    <div id="match-msg" style="font-size:0.8rem; margin-top:4px;"></div>
                </div>

                <button id="submit-btn" class="btn btn-burgundy w-100">
                    Reset Password
                </button>
            </form>

            <div class="mt-3" style="color:#C9AFAF; font-size:0.9rem;">
                <a href="/forgot-password" style="color:#8B2E2E;">Request a new link</a>
            </div>
        </div>
    </div>
</div>

<script>
    const newPw     = document.getElementById('newPw');
    const confirmPw = document.getElementById('confirmPw');
    const msg       = document.getElementById('match-msg');
    const btn       = document.getElementById('submit-btn');

    function checkMatch() {
        if (!confirmPw.value) { msg.textContent = ''; btn.disabled = false; return; }
        if (newPw.value === confirmPw.value) {
            msg.textContent = '✔ Passwords match';
            msg.style.color = '#69F0AE';
            btn.disabled = false;
        } else {
            msg.textContent = '✘ Passwords do not match';
            msg.style.color = '#FF8A80';
            btn.disabled = true;
        }
    }
    newPw.addEventListener('input', checkMatch);
    confirmPw.addEventListener('input', checkMatch);
</script>

{% endblock %}
