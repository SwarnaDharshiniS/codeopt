{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card card-dark p-4">
            <h3 class="mb-3" style="color:#F8E9E9;">Login</h3>

            <form method="POST">
                <div class="mb-3" style="color:#F8E9E9;">
                    <label>Email</label>
                    <input name="email" class="form-control" required>
                </div>

                <div class="mb-3" style="color:#F8E9E9;">
                    <label>Password</label>
                    <input name="password" type="password"
                           class="form-control" required>
                </div>

                <button class="btn btn-burgundy w-100">Login</button>
            </form>

            <div class="mt-3" style="color:#C9AFAF;">
                New here?
                <a href="/register" style="color:#8B2E2E;">Create an account</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
