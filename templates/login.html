{% extends "base.html" %}
{% block content %}

<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card card-dark p-4">
            <h3 class="mb-3" style="color:#F8E9E9;">Login</h3>

            <form method="POST">
                <div class="mb-3" style="color:#F8E9E9;">
                    <label>Email</label>
                    <input name="email" type="email" class="form-control"
                           style="background:#2A1C1C; color:#F8E9E9; border-color:#5C3A2E;"
                           required>
                </div>

                <div class="mb-3" style="color:#F8E9E9;">
                    <label>Password</label>
                    <input name="password" type="password"
                           class="form-control"
                           style="background:#2A1C1C; color:#F8E9E9; border-color:#5C3A2E;"
                           required>
                </div>

                <button class="btn btn-burgundy w-100">Login</button>
            </form>

            <div class="mt-3 d-flex justify-content-between align-items-center"
                 style="font-size:0.9rem;">
                <span style="color:#C9AFAF;">
                    New here?
                    <a href="/register" style="color:#8B2E2E;">Create an account</a>
                </span>
                <a href="/forgot-password" style="color:#8B2E2E;">Forgot password?</a>
            </div>
        </div>
    </div>
</div>

{% endblock %}
